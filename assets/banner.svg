<svg width="1280" height="400" viewBox="0 0 1280 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38000A"/>
      <stop offset="55%" stop-color="#9B1313"/>
      <stop offset="100%" stop-color="#38000A"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFA896"/>
      <stop offset="100%" stop-color="#CD1C18"/>
    </linearGradient>
    <clipPath id="revealName">
      <rect x="0" y="0" height="120" width="0">
        <animate attributeName="width" from="0" to="760" dur="2.2s" fill="freeze" begin="0.3s"/>
      </rect>
    </clipPath>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>

  <!-- subtle grid texture -->
  <g opacity="0.08" stroke="#FFA896">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
  </g>

  <!-- name, revealed left-to-right -->
  <g transform="translate(90,150)" clip-path="url(#revealName)">
    <text x="0" y="0" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="72" font-weight="700" fill="url(#textGrad)">Hasnat Abbasi</text>
  </g>

  <!-- subtitle -->
  <text x="90" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="24" fill="#FFA896" opacity="0">
    AI / ML Engineer &#8226; Full Stack Python Developer
    <animate attributeName="opacity" from="0" to="1" dur="1s" begin="2.4s" fill="freeze"/>
  </text>

  <!-- terminal line -->
  <g transform="translate(90,260)">
    <rect x="-20" y="-30" width="620" height="60" rx="10" fill="#0A0002" opacity="0.6"/>
    <text x="0" y="8" font-family="Fira Code, Consolas, monospace" font-size="18" fill="#FFA896" opacity="0">
      user@dev:~$ cat README.md
      <animate attributeName="opacity" from="0" to="1" dur="0.6s" begin="3.2s" fill="freeze"/>
    </text>
    <rect x="345" y="-14" width="10" height="20" fill="#CD1C18" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="3.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ambient glow orbs -->
  <circle cx="1150" cy="80" r="60" fill="#CD1C18" opacity="0.15">
    <animate attributeName="r" values="60;75;60" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="320" r="40" fill="#FFA896" opacity="0.12">
    <animate attributeName="r" values="40;55;40" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
